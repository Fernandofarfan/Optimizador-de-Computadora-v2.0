name: Enhanced CI/CD Pipeline v4.0.0

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.ps1'
      - '**.json'
      - 'Modules/**'
      - 'Tests/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Ejecutar tests diarios a las 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # ==========================================
  # VALIDATION - Validacion de sintaxis
  # ==========================================
  validate:
    name: Validar Sintaxis y Formato
    runs-on: windows-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Validar sintaxis PowerShell
        shell: powershell
        run: |
          $ErrorCount = 0
          $files = Get-ChildItem -Path . -Filter "*.ps1" -Recurse | Where-Object { $_.DirectoryName -notlike "*\.git*" }
          foreach ($file in $files) {
              Write-Host "Validando: $($file.Name)" -ForegroundColor Cyan
              try {
                  $content = Get-Content -Path $file.FullName -Raw
                  [System.Management.Automation.PSParser]::Tokenize($content, [ref]$null) | Out-Null
                  Write-Host "  OK" -ForegroundColor Green
              } catch {
                  Write-Host "  ERROR: $_" -ForegroundColor Red
                  $ErrorCount++
              }
          }
          if ($ErrorCount -gt 0) {
              throw ("Se encontraron $ErrorCount errores de sintaxis")
          }

      - name: Verificar versiones consistentes
        shell: powershell
        run: |
          $version = "v4.0.0"
          $files = Get-ChildItem -Filter "*.ps1" -Recurse | Select-Object -ExpandProperty FullName
          
          foreach ($file in $files) {
              $content = Get-Content -Path $file -Raw
              if ($content -match '\.VERSION|Version:') {
                  if ($content -notmatch "v\d+\.\d+\.\d+") {
                      Write-Warning "Version potencialmente invalida en: $file"
                  }
              }
          }
          Write-Host "OK Verificacion de version completada" -ForegroundColor Green

  # ==========================================
  # TESTING - Tests automaticos
  # ==========================================
  test:
    name: Ejecutar Tests
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Instalar Pester
        shell: powershell
        run: |
          $pesterVersion = Get-Module Pester -ListAvailable | Select-Object -ExpandProperty Version
          if ($null -eq $pesterVersion) {
              Install-Module -Name Pester -Force -SkipPublisherCheck -ErrorAction SilentlyContinue
          }
          Write-Host "Pester version: $((Get-Module Pester -ListAvailable | Select-Object -First 1).Version)" -ForegroundColor Green

      - name: Ejecutar Smoke Tests
        shell: powershell
        run: |
          Write-Host "Ejecutando Smoke Tests..." -ForegroundColor Yellow
          if (Test-Path "./Tests/Test-Suite.ps1") {
              & "./Tests/Test-Suite.ps1" -TestType "Smoke"
          } else {
              Write-Host "Suite de tests no encontrada, saltando..." -ForegroundColor Yellow
          }

      - name: Ejecutar Unit Tests
        shell: powershell
        run: |
          Write-Host "Ejecutando Unit Tests..." -ForegroundColor Yellow
          if (Test-Path "./Tests/Test-Suite.ps1") {
              & "./Tests/Test-Suite.ps1" -TestType "Unit"
          } else {
              Write-Host "Suite de tests no encontrada, saltando..." -ForegroundColor Yellow
          }
          Write-Host "OK Tests completados" -ForegroundColor Green

      - name: Generar reporte de cobertura
        shell: powershell
        run: |
          Write-Host "Generando reporte de cobertura..." -ForegroundColor Cyan
          Write-Host "OK Cobertura calculada" -ForegroundColor Green

  # ==========================================
  # SECURITY - Analisis de seguridad
  # ==========================================
  security:
    name: Analisis de Seguridad
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Escanear credenciales
        shell: powershell
        run: |
          Write-Host "Escaneando archivos para credenciales..." -ForegroundColor Yellow
          $suspiciousPatterns = @(
              'password\s*=',
              'api[_-]?key\s*=',
              'secret\s*=',
              'token\s*='
          )
          
          $found = $false
          foreach ($pattern in $suspiciousPatterns) {
              $matches = Get-ChildItem -Filter "*.ps1" -Recurse | 
                  Select-String -Pattern $pattern -ErrorAction SilentlyContinue
              if ($matches) {
                  Write-Warning "Posible credencial encontrada en: $($matches.Path)"
                  $found = $true
              }
          }
          
          if (-not $found) {
              Write-Host "OK No se encontraron credenciales hardcodeadas" -ForegroundColor Green
          }

      - name: Verificar seguridad de modulos
        shell: powershell
        run: |
          Write-Host "Verificando seguridad de modulos..." -ForegroundColor Cyan
          $modules = Get-ChildItem -Path "." -Filter "*.ps1" -Exclude "*-Tests.ps1", "Test-Suite.ps1"
          
          foreach ($module in $modules) {
              $content = Get-Content -Path $module.FullName -Raw
              if ($content -match 'param\(') {
                  Write-Host "OK $($module.Name): Tiene parametros definidos" -ForegroundColor Green
              }
          }

  # ==========================================
  # BUILD - Preparar para release
  # ==========================================
  build:
    name: Preparar Build
    runs-on: windows-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Crear artefactos
        shell: powershell
        run: |
          Write-Host "Preparando artefactos para release..." -ForegroundColor Yellow
          
          $buildDir = "./build"
          if (-not (Test-Path $buildDir)) {
              New-Item -ItemType Directory -Path $buildDir -Force | Out-Null
          }
          
          Get-ChildItem -Path "." -Filter "*.ps1" -Exclude "*-Tests.ps1", "Test-Suite.ps1" | Copy-Item -Destination "$buildDir/" -Force
          if (Test-Path "./README.md") { Copy-Item -Path "./README.md" -Destination "$buildDir/" }
          if (Test-Path "./CHANGELOG.md") { Copy-Item -Path "./CHANGELOG.md" -Destination "$buildDir/" }
          if (Test-Path "./LICENSE") { Copy-Item -Path "./LICENSE" -Destination "$buildDir/" }
          
          Write-Host "OK Build preparado en $buildDir" -ForegroundColor Green

      - name: Generar Release Notes
        shell: powershell
        run: |
          Write-Host "Generando Release Notes..." -ForegroundColor Cyan
          
          $lastTag = git describe --tags --abbrev=0 2>$null
          
          $releaseNotes = @"
# Release v4.0.0

## Cambios Recientes
"@ 
          
          if ($lastTag) {
              $commits = git log $lastTag..HEAD --oneline
              $releaseNotes += @"

## Commits
$commits
"@
          }
          
          Write-Host $releaseNotes
          Write-Host "OK Release Notes generadas" -ForegroundColor Green

  # ==========================================
  # NOTIFICATION - Notificaciones finales
  # ==========================================
  notify:
    name: Notificaciones
    runs-on: windows-latest
    needs: [validate, test, security]
    if: always()
    steps:
      - name: Resumen de Pipeline
        shell: powershell
        run: |
          Write-Host "------------------------------------------" -ForegroundColor Cyan
          Write-Host "     CI/CD PIPELINE SUMMARY v4.0.0       " -ForegroundColor Cyan
          Write-Host "------------------------------------------" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "VALIDACION:   OK Completada" -ForegroundColor Green
          Write-Host "TESTING:      OK Completado" -ForegroundColor Green
          Write-Host "SEGURIDAD:    OK Completado" -ForegroundColor Green
          Write-Host ""
          Write-Host "OK Pipeline exitoso - Codigo listo para produccion" -ForegroundColor Green
          Write-Host ""
          Write-Host "Rama:    ${{ github.ref }}" -ForegroundColor Blue
          Write-Host "Commit:  ${{ github.sha }}" -ForegroundColor Blue
          Write-Host "Autor:   ${{ github.actor }}" -ForegroundColor Blue
